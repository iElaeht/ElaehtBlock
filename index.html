<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    
    <link rel="apple-touch-icon" sizes="57x57" href="/icons/apple-icon-57x57.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/apple-icon-180x180.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32x32.png">
    <link rel="manifest" href="/icons/manifest.json">
    
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#0f172a" /> 
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

    <title>Elaeht Block AI</title>

    <style>
      * {
        user-select: none;
        -webkit-user-select: none;
        -webkit-tap-highlight-color: transparent;
        touch-action: none; 
      }
      html, body {
        margin: 0; padding: 0; width: 100%; height: 100%;
        background-color: #0f172a; 
        overflow: hidden; overscroll-behavior: none; position: fixed; 
      }
      #root { width: 100%; height: 100%; }
    </style>

    <script>
      // --- SISTEMA DE AUTO-ACTUALIZACIÓN CRÍTICA ---
      // Si un script falla (Error 404 de Vercel), borramos caché y recargamos
      window.addEventListener('error', function(e) {
        if (e.target.tagName === 'SCRIPT' || e.target.tagName === 'LINK') {
          console.warn('Archivo antiguo detectado. Limpiando cache...');
          if ('serviceWorker' in navigator) {
            navigator.serviceWorker.getRegistrations().then(registrations => {
              for(let reg of registrations) reg.unregister();
            });
          }
          window.location.reload(true);
        }
      }, true);

      // --- REGISTRO DE SERVICE WORKER CON CONTROL DE VERSION ---
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').then(reg => {
            // Si hay una actualización esperando, forzamos que tome el control
            reg.onupdatefound = () => {
              const installingWorker = reg.installing;
              installingWorker.onstatechange = () => {
                if (installingWorker.state === 'installed' && navigator.serviceWorker.controller) {
                  console.log('Nueva versión detectada. Actualizando...');
                  window.location.reload();
                }
              };
            };
            console.log('AI BLOCK 2.9: Online');
          });
        });
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
