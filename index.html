<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/apple-touch-icon.png">
    <link rel="icon" type="image/svg+xml" href="/icons/favicon.svg">
    <link rel="manifest" href="/icons/site.webmanifest">
    
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, interactive-widget=resizes-content" />
    
    <meta name="theme-color" content="#A8E6CF" /> 
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

    <title>AI Mangas</title>

    <style>
      /* RESET TOTAL */
      * {
        box-sizing: border-box;
        user-select: none;
        -webkit-user-select: none;
        -webkit-tap-highlight-color: transparent;
        /* Permitimos scroll en el eje Y solo si es necesario, 
           pero bloqueamos gestos del navegador */
        touch-action: pan-y; 
      }

      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        /* Usamos dvh (Dynamic Viewport Height) para que en móviles 
           ignore las barras de navegación del navegador */
        height: 100dvh;
        background-color: #0f172a; 
        overflow: hidden;
        overscroll-behavior: none;
        /* Evitamos el rebote elástico de iOS que descuadra el dock */
        position: fixed; 
        display: flex;
        flex-direction: column;
      }

      #root {
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        /* Centrado principal */
        align-items: center;
        justify-content: center;
        /* Aseguramos que el contenido respete el notch del iPhone */
        padding-top: env(safe-area-inset-top);
        padding-bottom: env(safe-area-inset-bottom);
        padding-left: env(safe-area-inset-left);
        padding-right: env(safe-area-inset-right);
      }
    </style>

    <script>
      // --- SISTEMA DE AUTO-ACTUALIZACIÓN ---
      window.addEventListener('error', function(e) {
        if (e.target.tagName === 'SCRIPT' || e.target.tagName === 'LINK') {
          console.warn('Archivo antiguo detectado. Limpiando cache...');
          if ('serviceWorker' in navigator) {
            navigator.serviceWorker.getRegistrations().then(registrations => {
              for(let reg of registrations) reg.unregister();
            });
          }
          window.location.reload(true);
        }
      }, true);

      // --- REGISTRO DE SERVICE WORKER ---
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          // Añadimos un pequeño timestamp para forzar la lectura del nuevo sw.js
          navigator.serviceWorker.register('/sw.js?v=3.4').then(reg => {
            reg.onupdatefound = () => {
              const installingWorker = reg.installing;
              installingWorker.onstatechange = () => {
                if (installingWorker.state === 'installed' && navigator.serviceWorker.controller) {
                  console.log('Versión 3.4 Detectada. Actualizando...');
                  window.location.reload();
                }
              };
            };
            console.log('AI BLOCK 3.4: Sistema Visual Actualizado');
          });
        });
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
